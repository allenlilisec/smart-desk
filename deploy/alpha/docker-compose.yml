name: smartdesk-alpha

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartdesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartdesk}
      POSTGRES_DB: ${POSTGRES_DB:-smartdesk_core}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - smartdesk-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartdesk} -d ${POSTGRES_DB:-smartdesk_core}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - smartdesk-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    networks:
      - smartdesk-internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    networks:
      - smartdesk-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  core:
    build:
      context: ../../src/smartdesk-core
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      CORE_HTTP_ADDR: ":8081"
      CORE_ORG_ID: ${CORE_ORG_ID:-default}
      CORE_DATABASE_URL: postgres://${POSTGRES_USER:-smartdesk}:${POSTGRES_PASSWORD:-smartdesk}@postgres:5432/${POSTGRES_DB:-smartdesk_core}?sslmode=disable
    networks:
      - smartdesk-internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  insight:
    build:
      context: ../../src/smartdesk-insight
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENV: production
      DEBUG: "false"
      HOST: 0.0.0.0
      PORT: "8000"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smartdesk}:${POSTGRES_PASSWORD:-smartdesk}@postgres:5432/smartdesk_insight
      NATS_URL: nats://nats:4222
      NATS_STREAM: SMARTDESK_EVENTS
      NATS_SUBJECT: smartdesk.ticket.*
      NATS_DURABLE: insight-durable
      SMTP_HOST: console
    networks:
      - smartdesk-internal
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  gateway:
    build:
      context: ../../src/smartdesk-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3000"
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set (>=32 bytes)}
      JWT_ACCESS_TTL_SECONDS: "900"
      JWT_REFRESH_TTL_SECONDS: "604800"
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: "true"
      DEFAULT_ORG_ID: ${DEFAULT_ORG_ID:-default}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
      COOKIE_SECURE: "false"
      AUTH_THROTTLE_TTL_MS: "60000"
      AUTH_THROTTLE_LIMIT: "5"
    ports:
      - "${GATEWAY_PORT:-8080}:3000"
    networks:
      - smartdesk-internal
      - smartdesk-edge
    depends_on:
      redis:
        condition: service_healthy
      core:
        condition: service_healthy
      insight:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/readyz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: ../../src/smartdesk-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080/api/v1}
        NEXT_PUBLIC_USE_MOCK: "false"
    restart: unless-stopped
    environment:
      PORT: "3000"
      NODE_ENV: production
    ports:
      - "${WEB_PORT:-3001}:3000"
    networks:
      - smartdesk-edge
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  # 逻辑隔离：core/中间件无 ports 映射；不使用 internal:true 以免阻断 gateway 宿主机端口发布（Docker 限制）
  smartdesk-internal:
    driver: bridge
  smartdesk-edge:
    driver: bridge

volumes:
  pgdata:
  miniodata:
