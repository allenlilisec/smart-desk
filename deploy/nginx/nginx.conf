# SmartDesk canary ingress — weight-based upstream for gateway + web.
# Weights are injected at container start via envsubst (see entrypoint).

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    upstream gateway_pool {
        server gateway-stable:3000 weight=${GATEWAY_STABLE_WEIGHT};
        server gateway-canary:3000 weight=${GATEWAY_CANARY_WEIGHT};
    }

    upstream web_pool {
        server web-stable:3000 weight=${WEB_STABLE_WEIGHT};
        server web-canary:3000 weight=${WEB_CANARY_WEIGHT};
    }

    server {
        listen 80;

        location /api/ {
            proxy_pass http://gateway_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Canary-Version $upstream_addr;
        }

        location / {
            proxy_pass http://web_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
