# SmartDesk canary ingress — replica-count-based upstream for gateway + web.
# Upstream server lists are generated at container start by docker-entrypoint.sh.
# Docker DNS resolves each service name to all replica IPs; nginx creates one
# peer per IP with equal weight, so the traffic ratio equals the replica ratio.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    upstream gateway_pool {
        ${GATEWAY_STABLE_SERVER}
        ${GATEWAY_CANARY_SERVER}
    }

    upstream web_pool {
        ${WEB_STABLE_SERVER}
        ${WEB_CANARY_SERVER}
    }

    server {
        listen 80;

        location /api/ {
            proxy_pass http://gateway_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Canary-Version $upstream_addr;
        }

        location / {
            proxy_pass http://web_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
