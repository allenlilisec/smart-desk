apiVersion: v1
kind: Service
metadata:
  name: web-stable
  namespace: smartdesk-canary
spec:
  selector:
    app: web
    version: stable
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: web-canary
  namespace: smartdesk-canary
spec:
  selector:
    app: web
    version: canary
  ports:
    - port: 80
      targetPort: 3000
