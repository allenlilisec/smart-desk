apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-canary
  namespace: smartdesk-canary
  labels:
    app: web
    version: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
      version: canary
  template:
    metadata:
      labels:
        app: web
        version: canary
    spec:
      containers:
        - name: web
          image: smartdesk/web:canary
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: smartdesk-config
          env:
            - name: SERVICE
              value: "web"
            - name: VERSION
              value: "canary"
            - name: PORT
              value: "3000"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
