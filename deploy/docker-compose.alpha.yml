    ports:
      - "${GATEWAY_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [smartdesk-alpha]

  # ── web 服务 ──────────────────────────────────────────────
  web:
    <<: *service-common
    container_name: alpha-web
    image: ${WEB_IMAGE:-allenlilisec/smartdesk-web:latest}
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      ENV: alpha
      SERVICE: web
      VERSION: alpha
      PORT: "3000"
      API_BASE_URL: "http://gateway:3000"
    ports:
      - "${WEB_PORT:-3002}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [smartdesk-alpha]

  # ── 入口 nginx ────────────────────────────────────────────
  ingress:
    image: nginx:alpine
    container_name: alpha-ingress
    depends_on:
      gateway:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "${INGRESS_PORT:-18080}:80"
    volumes:
      - ./nginx/alpha-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [smartdesk-alpha]

volumes:
  postgres-data:
  minio-data:
  nats-certs:
  nats-data:

networks:
  smartdesk-alpha:
    driver: bridge
