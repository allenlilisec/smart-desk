# SmartDesk 金丝雀双轨预发环境（compose 副本比近似流量分割）
# 对齐 specs/灰度发布策略.md C1/C2/C3 与 specs/回滚预案.md §4.4
#
# 用法：
#   docker compose -f deploy/docker-compose.canary.yml up -d
#   ./deploy/scripts/canary-stage.sh c1   # 5%  (19:1)
#   ./deploy/scripts/canary-stage.sh c2   # 25% (3:1)
#   ./deploy/scripts/canary-stage.sh c3   # 100% canary
#   ./deploy/scripts/canary-stage.sh rollback

name: smartdesk-canary

x-service-common: &service-common
  restart: unless-stopped
  networks: [smartdesk]

x-core-build: &core-build
  context: ../src/smartdesk-core
  dockerfile: ../../deploy/core/Dockerfile

x-core-env: &core-env
  CORE_HTTP_ADDR: "0.0.0.0:8080"
  CORE_DATABASE_URL: "${CORE_DATABASE_URL:-postgres://smartdesk:smartdesk@postgres:5432/smartdesk?sslmode=disable}"
  CORE_ORG_ID: "${CORE_ORG_ID:-default}"
  CORE_SERVICE_JWT_PUBLIC_KEY: "${CORE_SERVICE_JWT_PUBLIC_KEY:-}"
  CORE_SERVICE_JWT_PUBLIC_KEY_FILE: "${CORE_SERVICE_JWT_PUBLIC_KEY_FILE:-}"
  CORE_SERVICE_JWT_AUDIENCE: "${CORE_SERVICE_JWT_AUDIENCE:-core}"
  CORE_SERVICE_JWT_ISSUER: "${CORE_SERVICE_JWT_ISSUER:-smartdesk-gateway}"

services:
  # ── 共享依赖 ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smartdesk
      POSTGRES_PASSWORD: smartdesk
      POSTGRES_DB: smartdesk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartdesk"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [smartdesk]

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [smartdesk]

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [smartdesk]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    networks: [smartdesk]

  # ── core 双轨 ─────────────────────────────────────────────
  core-stable:
    <<: *service-common
    build: *core-build
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *core-env
      SERVICE: core
      VERSION: stable
    labels:
      - "version=stable"
      - "service=core"
      - "prometheus.scrape=true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/readyz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      replicas: ${CORE_STABLE_REPLICAS:-19}

  core-canary:
    <<: *service-common
    build: *core-build
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *core-env
      SERVICE: core
      VERSION: canary
    labels:
      - "version=canary"
      - "service=core"
      - "prometheus.scrape=true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/readyz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      replicas: ${CORE_CANARY_REPLICAS:-1}

  # ── insight 双轨 ──────────────────────────────────────────
  insight-stable:
    <<: *service-common
    build:
      context: ../src/smartdesk-insight
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      ENV: staging
      SERVICE: insight
      VERSION: stable
      PORT: "8000"
      DATABASE_URL: "postgresql+asyncpg://smartdesk:smartdesk@postgres:5432/smartdesk"
      NATS_URL: "nats://nats:4222"
      CORE_SERVICE_URL: "${CORE_SERVICE_URL:-http://core-canary:8081}"
      CORE_SERVICE_TOKEN: "${CORE_SERVICE_TOKEN:-}"
      CORE_SERVICE_TIMEOUT_SECONDS: "${CORE_SERVICE_TIMEOUT_SECONDS:-5.0}"
      SERVICE_JWT_ALGORITHM: "${SERVICE_JWT_ALGORITHM:-RS256}"
      SERVICE_JWT_PUBLIC_KEY: "${SERVICE_JWT_PUBLIC_KEY:-}"
      SERVICE_JWT_SECRET_KEY: "${SERVICE_JWT_SECRET_KEY:-}"
      SERVICE_JWT_AUDIENCE: "${SERVICE_JWT_AUDIENCE:-insight}"
      SERVICE_JWT_ISSUER: "${SERVICE_JWT_ISSUER:-smartdesk-gateway}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).read()\""]
      interval: 10s
      timeout: 3s
      retries: 10
    labels:
      - "version=stable"
      - "service=insight"
      - "prometheus.scrape=true"
    deploy:
      replicas: ${INSIGHT_STABLE_REPLICAS:-19}

  insight-canary:
    <<: *service-common
    build:
      context: ../src/smartdesk-insight
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      ENV: staging
      SERVICE: insight
      VERSION: canary
      PORT: "8000"
      DATABASE_URL: "postgresql+asyncpg://smartdesk:smartdesk@postgres:5432/smartdesk"
      NATS_URL: "nats://nats:4222"
      CORE_SERVICE_URL: "${CORE_SERVICE_URL:-http://core-canary:8081}"
      CORE_SERVICE_TOKEN: "${CORE_SERVICE_TOKEN:-}"
      CORE_SERVICE_TIMEOUT_SECONDS: "${CORE_SERVICE_TIMEOUT_SECONDS:-5.0}"
      SERVICE_JWT_ALGORITHM: "${SERVICE_JWT_ALGORITHM:-RS256}"
      SERVICE_JWT_PUBLIC_KEY: "${SERVICE_JWT_PUBLIC_KEY:-}"
      SERVICE_JWT_SECRET_KEY: "${SERVICE_JWT_SECRET_KEY:-}"
      SERVICE_JWT_AUDIENCE: "${SERVICE_JWT_AUDIENCE:-insight}"
      SERVICE_JWT_ISSUER: "${SERVICE_JWT_ISSUER:-smartdesk-gateway}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).read()\""]
      interval: 10s
      timeout: 3s
      retries: 10
    labels:
      - "version=canary"
      - "service=insight"
      - "prometheus.scrape=true"
    deploy:
      replicas: ${INSIGHT_CANARY_REPLICAS:-1}

  # ── gateway 双轨（nginx 入口按副本比分流）──────────────────
  gateway-stable:
    <<: *service-common
    build:
      context: ./healthz-stub
    environment:
      SERVICE: gateway
      VERSION: stable
      PORT: "3000"
    labels:
      - "version=stable"
      - "service=gateway"
      - "prometheus.scrape=true"
    deploy:
      replicas: ${GATEWAY_STABLE_REPLICAS:-19}

  gateway-canary:
    <<: *service-common
    build:
      context: ./healthz-stub
    environment:
      SERVICE: gateway
      VERSION: canary
      PORT: "3000"
    labels:
      - "version=canary"
      - "service=gateway"
      - "prometheus.scrape=true"
    deploy:
      replicas: ${GATEWAY_CANARY_REPLICAS:-1}

  # ── web 双轨 ──────────────────────────────────────────────
  web-stable:
    <<: *service-common
    build:
      context: ./healthz-stub
    environment:
      SERVICE: web
      VERSION: stable
      PORT: "3000"
    labels:
      - "version=stable"
      - "service=web"
    deploy:
      replicas: ${WEB_STABLE_REPLICAS:-19}

  web-canary:
    <<: *service-common
    build:
      context: ./healthz-stub
    environment:
      SERVICE: web
      VERSION: canary
      PORT: "3000"
    labels:
      - "version=canary"
      - "service=web"
    deploy:
      replicas: ${WEB_CANARY_REPLICAS:-1}

  # ── 入口 nginx（按副本数决定是否加入 upstream，等权分发）────
  ingress:
    build:
      context: ./nginx
    depends_on:
      - gateway-stable
      - gateway-canary
      - web-stable
      - web-canary
    ports:
      - "${INGRESS_PORT:-19080}:80"
    environment:
      GATEWAY_STABLE_REPLICAS: "${GATEWAY_STABLE_REPLICAS:-19}"
      GATEWAY_CANARY_REPLICAS: "${GATEWAY_CANARY_REPLICAS:-1}"
      WEB_STABLE_REPLICAS: "${WEB_STABLE_REPLICAS:-19}"
      WEB_CANARY_REPLICAS: "${WEB_CANARY_REPLICAS:-1}"
    networks: [smartdesk]

networks:
  smartdesk:
    driver: bridge
