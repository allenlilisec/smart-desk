name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate OpenAPI types
        run: npm run generate:types

      - name: Check generated types are up-to-date
        run: git diff --exit-code src/types/gateway.d.ts

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Audit (block critical)
        run: npm audit --audit-level=critical

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
