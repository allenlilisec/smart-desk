openapi: 3.1.0
info:
  title: SmartDesk Insight API (smartdesk-insight)
  version: 1.0.0
  description: >
    智能分析服务内部契约（Python/FastAPI）。覆盖自动分类/定级建议、相似工单检索、统计聚合
    （看板读模型）、通知（站内+邮件）与通知策略、分类纠偏写回。**仅给建议，不持有工单权威状态**：
    分类/定级落库决策权在 core；insight 经事件总线异步消费 core 事件并异步写回建议。
    **仅供内部调用**：调用方为 gateway，携带服务令牌(serviceAuth)。最终用户身份（user id / roles / org）
    由 gateway 私钥签发的 service-jwt 以 claim 形式承载（sub / roles / org_id），insight 仅信任已验签 claim
    作为身份来源；明文 X-User-* / X-Org-Id 头不再用于授权、RBAC、租户隔离等安全决策（可伪造），
    仅可作为可选链路追踪/日志头保留。检索接口对二期向量方案**前向兼容**（OQ-5：契约不绑定实现）。
    领域事件信封见 #/components/schemas/DomainEvent（与 specs/SmartDesk系统架构设计说明书.md §5 一致）。
servers:
  - url: http://smartdesk-insight.internal/v1
    description: 内网（不对外暴露）

tags:
  - name: classification
  - name: similarity
  - name: stats
  - name: notifications
  - name: feedback
  - name: events

security:
  - serviceAuth: []

paths:
  /classification/predict:
    post:
      tags: [classification]
      summary: 自动分类 + 定级建议（US-3.1/US-3.2，同步预测接口）
      description: >
        给出分类预测与置信度、优先级建议。OQ-4：一期默认"建议+人工确认"；
        置信度 ≥ 阈值(默认 0.85，可配)时返回 auto_fill_recommended=true，由 core 决定是否自动填充。
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PredictRequest' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PredictResult' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { description: 模型不可用（调用方应降级，不阻塞建单）, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /similarity/search:
    post:
      tags: [similarity]
      summary: 相似工单推荐 Top-N（US-3.3）
      description: >
        OQ-5 一期=关键词+标题/分类相似；二期=向量检索。响应字段对实现中立
        （score 语义不绑定算法），新增向量召回不破坏契约。计算不阻塞工单详情主加载（异步/懒加载）。
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SimilarityRequest' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/SimilarityResult' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /stats/aggregate:
    get:
      tags: [stats]
      summary: 统计聚合（US-3.4/US-6.2：按时间/分类/坐席/优先级出量、SLA 达成、时长）
      parameters:
        - { name: metric, in: query, required: true, schema: { $ref: '#/components/schemas/StatsMetric' } }
        - { name: group_by, in: query, schema: { type: string, enum: [time, category, assignee, priority, status], example: category } }
        - { name: interval, in: query, schema: { type: string, enum: [hour, day, week, month], default: day } }
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
        - { name: category_id, in: query, schema: { type: string, format: uuid } }
        - { name: assignee_id, in: query, schema: { type: string, format: uuid } }
        - { name: priority, in: query, schema: { type: string, enum: [P1, P2, P3, P4] } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/AggregateResult' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /stats/export:
    get:
      tags: [stats]
      summary: 导出报表 CSV（US-6.4，按当前筛选）
      parameters:
        - { name: metric, in: query, required: true, schema: { $ref: '#/components/schemas/StatsMetric' } }
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
      responses:
        '200': { description: CSV, content: { text/csv: { schema: { type: string, format: binary } } } }

  /notifications:
    get:
      tags: [notifications]
      summary: 站内通知中心列表（未读/已读，US-4.2）
      parameters:
        - { name: unread_only, in: query, schema: { type: boolean, default: false } }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/NotificationPage' } } } }
    post:
      tags: [notifications]
      summary: 发送通知（站内/邮件；至少一次+幂等 dedupe_key；US-4.1/US-4.3）
      description: >
        通常由事件消费内部触发；本接口供 gateway/core 显式发送（如系统公告）。
        跨租户校验：请求体中的 `user_id` 为目标用户，insight 必须调用 core 内部端点
        `GET /internal/users/{userId}` 获取 `UserTenantProfile` 并解析 `user_id → org_id`，
        与 service-jwt claim 中的 `org_id` 比对；一致方可发送，不一致返回 403（cross-tenant blocked）。
        core 用户目录不可用时 fail-closed，返回 503 或 403，禁止放行。调用方不得透传
        `x-target-user-org-id` 等目标租户头。
      parameters: [{ $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/NotificationSend' } } }
      responses:
        '202': { description: 已受理（异步发送）, content: { application/json: { schema: { $ref: '#/components/schemas/Notification' } } } }
        '403': { description: 越权（cross-tenant blocked 或角色不足）, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '503': { description: core 用户目录不可用（fail-closed）, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /notifications/{notifId}/read:
    parameters: [{ name: notifId, in: path, required: true, schema: { type: string, format: uuid } }]
    post:
      tags: [notifications]
      summary: 标记已读
      responses: { '204': { description: OK } }

  /notifications/policies:
    get:
      tags: [notifications]
      summary: 通知策略查询（按角色/事件类型订阅开关，US-4.4）
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/NotificationPolicy' } } } } }
    put:
      tags: [notifications]
      summary: 配置通知策略（admin，即时生效）
      description: >
        仅 `admin` 角色可写。角色判定以 service-jwt 已验签 `roles` claim 为准；
        不再依据明文 `X-User-Roles` 等代理头。
      requestBody:
        required: true
        content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/NotificationPolicy' } } } }
      responses:
        '200': { description: OK }
        '403': { description: 越权（非 admin 角色）, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /feedback/classification:
    post:
      tags: [feedback]
      summary: 分类纠偏回流（US-3.1 AC3，供模型迭代，OQ-4）
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/ClassificationFeedback' } } }
      responses: { '201': { description: 已记录 } }

  /healthz: { get: { tags: [events], summary: liveness, security: [], responses: { '200': { description: OK } } } }
  /readyz:  { get: { tags: [events], summary: readiness（含读模型/总线依赖）, security: [], responses: { '200': { description: OK }, '503': { description: 未就绪 } } } }

components:
  securitySchemes:
    serviceAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        gateway 私钥签发的服务令牌(service-jwt)。insight 强校验：锁定签名算法 RS256（拒绝 alg=none
        及其它算法）、校验签名（ops 注入公钥，缺失则 fail-fast 不启动）、pin aud=insight 与
        iss=smartdesk-gateway、要求 exp（并校验 nbf）。最终用户身份从已验签 claim 读取：
        sub=用户ID、roles=角色数组、org_id=租户；不再从 X-User-* / X-Org-Id 明文头取身份。
        验签失败返回 401。

  parameters:
    IdempotencyKey: { name: Idempotency-Key, in: header, required: false, schema: { type: string } }
    Page: { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
    PageSize: { name: page_size, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }

  responses:
    Unauthorized: { description: 未认证, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        details: { type: array, items: { type: object } }
        trace_id: { type: string }

    PredictRequest:
      type: object
      required: [ticket_id, title]
      properties:
        ticket_id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
    PredictResult:
      type: object
      properties:
        ticket_id: { type: string, format: uuid }
        category:
          type: object
          properties:
            category_id: { type: string, format: uuid, nullable: true }
            confidence: { type: number, format: float, minimum: 0, maximum: 1 }
        priority:
          type: object
          properties:
            value: { type: string, enum: [P1, P2, P3, P4] }
            confidence: { type: number, format: float }
        threshold: { type: number, format: float, example: 0.85 }
        auto_fill_recommended: { type: boolean, description: confidence≥threshold 且开启自动填充时 true }
        mode: { type: string, enum: [suggest, auto], default: suggest, description: 一期 suggest（建议+人工确认） }

    SimilarityRequest:
      type: object
      required: [ticket_id]
      properties:
        ticket_id: { type: string, format: uuid }
        title: { type: string }
        category_id: { type: string, format: uuid, nullable: true }
        top_n: { type: integer, default: 5, maximum: 20 }
    SimilarityResult:
      type: object
      properties:
        ticket_id: { type: string, format: uuid }
        method: { type: string, enum: [keyword, vector, hybrid], default: keyword, description: 实现中立；二期切 vector 不破坏契约 }
        items:
          type: array
          items:
            type: object
            properties:
              ticket_id: { type: string, format: uuid }
              number: { type: string }
              title: { type: string }
              score: { type: number, format: float, description: 相似度（0-1），语义不绑定具体算法 }
              summary: { type: string }
              resolution_excerpt: { type: string }

    StatsMetric:
      type: string
      enum: [volume, sla_attainment, resolution_time, backlog, reopen_rate, agent_workload, csat]
      description: 统计指标枚举（/stats/aggregate 与 /stats/export 共用；与 gateway StatsMetric 对齐）

    AggregateResult:
      type: object
      properties:
        metric: { $ref: '#/components/schemas/StatsMetric' }
        group_by: { type: string }
        interval: { type: string }
        series:
          type: array
          items:
            type: object
            properties:
              key: { type: string, description: 分组键（时间桶/分类名/坐席等） }
              value: { type: number }
        generated_at: { type: string, format: date-time }

    NotificationSend:
      type: object
      description: >
        发送通知请求体。`user_id` 为目标用户；insight 须调用 core `GET /internal/users/{userId}`
        解析其 `org_id`，并与当前请求上下文 service-jwt claim 中的 `org_id` 做跨租户校验；
        不一致时拒绝（403），禁止调用方透传 `x-target-user-org-id` 等目标租户头。
      required: [user_id, type, channel, title]
      properties:
        user_id: { type: string, format: uuid }
        ticket_id: { type: string, format: uuid, nullable: true }
        type: { type: string, example: ticket.assigned }
        channel: { type: string, enum: [inapp, email] }
        title: { type: string }
        body: { type: string }
        dedupe_key: { type: string, description: 幂等键（至少一次送达去重） }
    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        ticket_id: { type: string, format: uuid, nullable: true }
        type: { type: string }
        channel: { type: string, enum: [inapp, email] }
        title: { type: string }
        body: { type: string }
        status: { type: string, enum: [pending, sent, failed, retrying] }
        read_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    NotificationPage:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Notification' } }
        page: { type: integer }
        page_size: { type: integer }
        total: { type: integer }
        unread_count: { type: integer }
    NotificationPolicy:
      type: object
      required: [role, event_type, channel, enabled]
      properties:
        role: { type: string, enum: [requester, agent, lead, manager, admin] }
        event_type: { type: string }
        channel: { type: string, enum: [inapp, email] }
        enabled: { type: boolean }

    ClassificationFeedback:
      type: object
      required: [ticket_id, accepted]
      properties:
        ticket_id: { type: string, format: uuid }
        predicted_category_id: { type: string, format: uuid, nullable: true }
        confidence: { type: number, format: float }
        accepted: { type: boolean }
        corrected_category_id: { type: string, format: uuid, nullable: true }

    DomainEvent:
      type: object
      description: >
        领域事件统一信封（消费自事件总线 NATS JetStream；至少一次+幂等，event_id 去重）。
        与 specs/SmartDesk系统架构设计说明书.md §5.2 一致。此 schema 为事件契约文档化，非 HTTP 端点。

        **分区与顺序（D3 裁定，SUP-43）**：主题 `smartdesk.<domain>.<event>`，Stream `SMARTDESK_EVENTS`，
        以 `ticket_id` 作分区键（一致性哈希）。保证**单工单事件按 occurred_at 有序**；
        **跨工单不保证全局序**。消费侧仍须按 event_id 幂等去重（顺序保证不替代幂等）。
      required: [event_id, event_type, occurred_at, ticket_id, version]
      properties:
        event_id: { type: string, format: uuid }
        event_type:
          type: string
          enum:
            - ticket.created
            - ticket.assigned
            - ticket.reassigned
            - ticket.status_changed
            - ticket.commented
            - ticket.sla_warning
            - ticket.sla_breached
            - ticket.resolved
            - ticket.closed
            - ticket.reopened
            - ticket.merged
            - insight.classification_suggested
        occurred_at: { type: string, format: date-time }
        org_id: { type: string, default: default }
        ticket_id: { type: string, format: uuid }
        actor_id: { type: string, format: uuid, nullable: true }
        version: { type: integer, default: 1 }
        payload:
          description: >
            按 event_type 取下列之一（oneOf）。**选型以信封 event_type 为权威**，按下表映射，
            不依赖 JSON-Schema oneOf 的运行时自动判别（event_type 在信封上、不在 payload 内，
            标准 discriminator 无法以它为键自动选型——见 SUP-17 架构裁决⑤）。api-contract-check 按此表判定。

              | event_type                                   | payload schema              |
              |----------------------------------------------|-----------------------------|
              | ticket.created                               | TicketCreatedPayload        |
              | ticket.assigned / ticket.reassigned          | TicketAssignedPayload       |
              | ticket.status_changed                        | TicketStatusChangedPayload  |
              | ticket.resolved / ticket.closed / ticket.reopened | TicketResolvedPayload  |
              | ticket.sla_warning / ticket.sla_breached     | TicketSlaPayload            |
              | insight.classification_suggested             | ClassificationSuggestedPayload |
              | ticket.commented / ticket.merged             | (M4 固化，暂为自由 object) |

            **演进规则（version 语义）**：同一 version 内 payload 仅可**增量新增可选字段**（向后兼容）；
            删除/改名/改必填属破坏性变更，必须 bump version 并经架构裁决。当前 version=1。
          oneOf:
            - $ref: '#/components/schemas/TicketCreatedPayload'
            - $ref: '#/components/schemas/TicketAssignedPayload'
            - $ref: '#/components/schemas/TicketStatusChangedPayload'
            - $ref: '#/components/schemas/TicketResolvedPayload'
            - $ref: '#/components/schemas/TicketSlaPayload'
            - $ref: '#/components/schemas/ClassificationSuggestedPayload'
            - { type: object, description: '预留：ticket.commented/merged 等，M4 固化前不约束' }

    # ---- 领域事件 payload（按 event_type；字段名 = §3.1 权威列名，SUP-17 架构裁决①–⑤）----
    TicketCreatedPayload:
      type: object
      description: ticket.created 载荷。
      required: [requester_id, title]
      properties:
        requester_id: { type: string, format: uuid }                  # tickets.requester_id
        title:        { type: string }                                # tickets.title
        category_id:  { type: string, format: uuid, nullable: true }  # tickets.category_id
        priority:     { type: string, enum: [P1, P2, P3, P4] }        # tickets.priority

    TicketAssignedPayload:
      type: object
      description: ticket.assigned / ticket.reassigned 共用。
      required: [to_user_id]
      properties:
        to_user_id:   { type: string, format: uuid }                  # assignments.to_user_id
        from_user_id: { type: string, format: uuid, nullable: true }  # assignments.from_user_id
        kind:         { type: string, enum: [manual, auto, reassign, escalate] }  # assignments.kind
        reason:       { type: string, nullable: true }                # assignments.reason

    TicketStatusChangedPayload:
      type: object
      description: ticket.status_changed 载荷。
      required: [to_status, requester_id]
      properties:
        from_status:  { type: string }                               # ticket_status_history.from_status
        to_status:    { type: string }                               # ticket_status_history.to_status
        requester_id:
          type: string
          format: uuid
          description: >
            报单人。**core 硬约束**：ticket_status_history 无此列（§3.1），core 必须从
            tickets.requester_id 反范式化带入 payload；消费方不得为发通知回查 core
            （事件自包含，避免重新引入 §5.1 否决的同步耦合）。

    TicketResolvedPayload:
      type: object
      description: ticket.resolved / ticket.closed / ticket.reopened 共用。
      required: [requester_id]
      properties:
        requester_id:
          type: string
          format: uuid
          description: 报单人；同 status_changed，core 反范式化自 tickets.requester_id（硬约束）。
        resolution_excerpt: { type: string, nullable: true }

    TicketSlaPayload:
      type: object
      description: >
        ticket.sla_warning / ticket.sla_breached 载荷。
        due_at 取本次触发 timer 的截止时刻：core 按触发类型从 sla_timers.response_due_at
        或 sla_timers.resolve_due_at 择一填入（§3.1，二者无单一 due_at 列）。
      required: [level]
      properties:
        level:
          type: string
          enum: [warning, breached]
          description: >
            便利字段；**以信封 event_type 为权威**，取值必须一致
            （sla_warning→warning，sla_breached→breached），不一致视为契约违规。
        assignee_id: { type: string, format: uuid, nullable: true }  # tickets.assignee_id
        lead_id:     { type: string, format: uuid, nullable: true }  # 升级通知收件人（§5.2）
        due_at:      { type: string, format: date-time, description: 本次触发 timer 的截止时刻 }

    ClassificationSuggestedPayload:
      type: object
      description: insight.classification_suggested 载荷。version=1，附加-only 演进规则同 DomainEvent。
      required: [predicted_category_id, confidence, priority, applied]
      properties:
        predicted_category_id:
          type: string
          format: uuid
          nullable: true
          description: 预测的分类 ID（null 表示无法分类）
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: 分类置信度（0-1）
        priority:
          type: string
          enum: [P1, P2, P3, P4]
          nullable: true
          description: 建议的优先级（null 表示未建议）
        applied:
          type: boolean
          description: 该分类建议是否已被应用（用户接受或系统自动应用）
